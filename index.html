<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Гоблин DOM</title><style>body {
      margin: 0;
      padding: 20px;
      background: #2c3e50;
      display: flex;
      justify-content: center;
      font-family: Arial, sans-serif;
    }
    .field {
      display: grid;
      grid-template-columns: repeat(4, 100px);
      grid-template-rows: repeat(4, 100px);
      gap: 10px;
      background: #34495e;
      padding: 20px;
      border-radius: 15px;
    }
    .cell {
      width: 100px;
      height: 100px;
      background: #ecf0f1;
      border: 3px solid #bdc3c7;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .goblin {
      width: 80px;
      height: 80px;
    }</style><script defer="defer" src="main.js"></script></head><body><div class="field" id="field"></div></body></html>
